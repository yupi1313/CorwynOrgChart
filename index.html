<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Chart - FreeLimburg</title>
    <meta name="description" content="Interactive organizational chart for FreeLimburg. View and edit team structure.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header id="header">
            <div class="header-left">
                <h1>Organization Chart</h1>
                <span class="badge">FreeLimburg</span>
            </div>
            <div class="header-center">
                <div class="search-box">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="search-input" placeholder="Search people or teams..." />
                </div>
            </div>
            <div class="header-actions">
                <button id="btn-zoom-in" class="icon-btn" title="Zoom In">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                </button>
                <button id="btn-zoom-out" class="icon-btn" title="Zoom Out">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                </button>
                <button id="btn-fit" class="icon-btn" title="Fit to View">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                </button>
                <div class="divider"></div>
                <div class="export-dropdown">
                    <button id="btn-export" class="action-btn" title="Export">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Export
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <div id="export-menu" class="export-menu hidden">
                        <button data-export="png">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            Export as PNG
                        </button>
                        <button data-export="json">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                            Export as JSON
                        </button>
                    </div>
                </div>
                <button id="btn-reset" class="action-btn danger" title="Reset to Original">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                    Reset
                </button>
            </div>
        </header>
        <div id="canvas-wrapper">
            <div id="canvas">
                <svg id="connectors" xmlns="http://www.w3.org/2000/svg"></svg>
                <div id="chart"></div>
            </div>
        </div>

        <!-- Color Legend -->
        <div id="legend" class="legend">
            <div class="legend-title">Teams</div>
            <div class="legend-item"><span class="legend-dot" style="background:#a78bfa"></span>Executive</div>
            <div class="legend-item"><span class="legend-dot" style="background:#f472b6"></span>HR</div>
            <div class="legend-item"><span class="legend-dot" style="background:#fbbf24"></span>Finance</div>
            <div class="legend-item"><span class="legend-dot" style="background:#fb923c"></span>Marketing</div>
            <div class="legend-item"><span class="legend-dot" style="background:#a3e635"></span>Quants</div>
            <div class="legend-item"><span class="legend-dot" style="background:#94a3b8"></span>COO</div>
            <div class="legend-item"><span class="legend-dot" style="background:#34d399"></span>Product</div>
            <div class="legend-item"><span class="legend-dot" style="background:#f87171"></span>Operations</div>
            <div class="legend-item"><span class="legend-dot" style="background:#22d3ee"></span>Tech</div>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu" class="context-menu hidden">
        <button data-action="edit"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit</button>
        <button data-action="add-child"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> Add Person</button>
        <button data-action="add-team"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Add Team</button>
        <button data-action="add-sibling"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><line x1="10" y1="6.5" x2="14" y2="6.5"/></svg> Add Sibling</button>
        <hr>
        <button data-action="delete" class="danger"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Delete</button>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <h2>Edit Node</h2>
            <div class="form-group">
                <label for="edit-name">Name</label>
                <input type="text" id="edit-name" placeholder="Name">
            </div>
            <div class="form-group">
                <label for="edit-title">Title / Role</label>
                <input type="text" id="edit-title" placeholder="Title">
            </div>
            <div class="form-group">
                <label>Type</label>
                <div class="toggle-group">
                    <button id="toggle-person" class="toggle-btn active" data-type="person">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        Person
                    </button>
                    <button id="toggle-team" class="toggle-btn" data-type="team">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        Team
                    </button>
                </div>
            </div>
            <div class="modal-actions">
                <button id="edit-cancel" class="action-btn">Cancel</button>
                <button id="edit-save" class="action-btn primary">Save</button>
            </div>
        </div>
    </div>


    <!-- Confirm Modal -->
    <div id="confirm-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content confirm-modal-content">
            <h2 id="confirm-title">Confirm</h2>
            <p id="confirm-message" class="confirm-message"></p>
            <div class="form-group" style="margin-top:16px">
                <label for="confirm-passcode">Enter passcode</label>
                <input type="password" id="confirm-passcode" placeholder="4-digit code" maxlength="4" inputmode="numeric" autocomplete="off">
                <div id="confirm-error" class="passcode-error"></div>
            </div>
            <div class="modal-actions">
                <button id="confirm-cancel" class="action-btn">Cancel</button>
                <button id="confirm-ok" class="action-btn danger-btn">Delete</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
